server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: video-collaboration-backend

  # Database configuration
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:videocollab}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver
  
  # JPA / Hibernate configuration
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# Security & Third-Party API configuration
app:
  jwt:
    # Secret key used to sign application JWTs (must be 256-bit / 32-bytes minimum)
    secret: ${JWT_SECRET:dGhpcy1pcy1hLXNlY3JldC1rZXktZm9yLXZpZGVvLWNvbGxhYm9yYXRpb24tcGxhdGZvcm0tMjAyNg==}
    # Token expiration time (24 hours in milliseconds)
    expiration-ms: 86400000

  livekit:
    url: ${LIVEKIT_URL:https://your-livekit-url.com}
    api-key: ${LIVEKIT_API_KEY:your-livekit-api-key}
    api-secret: ${LIVEKIT_API_SECRET:your-livekit-api-secret}

  deepgram:
    api-key: ${DEEPGRAM_API_KEY:your-deepgram-api-key}
