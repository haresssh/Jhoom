server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: video-collaboration-backend
  profiles:
    active: local
  # JPA / Hibernate configuration
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# Security & Third-Party API configuration
app:
  jwt:
    # Token expiration time (24 hours in milliseconds)
    expiration-ms: 86400000

  livekit:
    url: ${LIVEKIT_URL:https://your-livekit-url.com}
    api-key: ${LIVEKIT_API_KEY:your-livekit-api-key}
    api-secret: ${LIVEKIT_API_SECRET:your-livekit-api-secret}

  deepgram:
    api-key: ${DEEPGRAM_API_KEY:your-deepgram-api-key}
