<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient: Brand Blue to Focus Indigo (matching the logo text style) -->
    <linearGradient id="jhoomGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0460ff" />
      <stop offset="100%" stop-color="#4d65ff" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer glass-like round card for premium branding structure -->
  <circle cx="256" cy="256" r="220" fill="#171731" opacity="0.05" />
  <circle cx="256" cy="256" r="220" stroke="url(#jhoomGrad)" stroke-width="12" fill="none" opacity="0.15" />
  
  <!-- Stylized Bold J in the center with glow -->
  <path fill="url(#jhoomGrad)" d="M280,100 L340,100 L340,310 C340,365 295,410 240,410 C185,410 140,365 140,310 L200,310 C200,332 218,350 240,350 C262,350 280,332 280,310 Z" filter="url(#glow)"/>
  
  <!-- A dynamic star/spark at the top-right to represent "Jhoom" energy -->
  <path fill="url(#jhoomGrad)" d="M380,80 L395,105 L425,105 L400,120 L410,145 L380,130 L350,145 L360,120 L335,105 L365,105 Z" />
</svg>